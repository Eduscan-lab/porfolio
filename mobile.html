<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile App UI</title>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f5ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  padding:60px 10%;
}

h1{
  font-size:3rem;
  margin-bottom:20px;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#ff00cc);

}

.section{
  background:var(--card);
  padding:40px;

  margin-top:30px;

.btn{

  margin-top:30px;
  padding:12px 25px;

  background:var(--accent);
  color:#000;

<body>
