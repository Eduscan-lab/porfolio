<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Identity</title>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f5ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  padding:60px 10%;
  transition:background 0.3s ease, color 0.3s ease;
}

h1{
  font-size:3rem;
  margin-bottom:20px;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#ff00cc);
  -webkit-background-clip:text;
  color:transparent;
}

.section{
  background:var(--card);
  padding:40px;
  border-radius:20px;
  margin-top:30px;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.section:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:12px 25px;
  border-radius:30px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:transform 0.3s ease, background 0.3s ease;
}

.btn:hover{
  transform:scale(1.05);
  background:#a855f7;
}

/* Light Theme */
.light-mode{
  --bg:#f9fafb;
  --card:rgba(0,0,0,0.05);
  --text:#111827;
  --accent:#2563eb;
}
</style>
</head>
<body>

<h1>Brand Identity</h1>

<div class="section">
  <h2>Project Overview</h2>
  <p>
    A complete branding solution including logo creation,
    typography system, color psychology, and brand guidelines.
  </p>
</div>

<div class="section">
  <h2>Deliverables</h2>
  <p>Logo System, Brand Book, Social Media Kit, Visual Assets</p>
</div>

<a href="index.html" class="btn">⬅ Back to Portfolio</a>
<button class="btn" onclick="toggleTheme()">🌗 Toggle Theme</button>
<button class="btn" onclick="addSection()">➕ Add Section</button>

<script>
// Toggle Dark/Light Theme
function toggleTheme(){
  document.body.classList.toggle('light-mode');
}

// Dynamically Add Section
function addSection(){
  const newSection = document.createElement('div');
  newSection.className = 'section';
  newSection.innerHTML = `
    <h2>Dynamic Section</h2>
    <p>This section was added using JavaScript functions!</p>
  `;
  document.body.appendChild(newSection);
}

// Scroll-to-Top Button
window.addEventListener('scroll', () => {
  if(window.scrollY > 200){
    if(!document.getElementById('scrollTopBtn')){
      const btn = document.createElement('button');
      btn.id = 'scrollTopBtn';
      btn.className = 'btn';
      btn.textContent = '⬆ Back to Top';
      btn.style.position = 'fixed';
      btn.style.bottom = '20px';
      btn.style.right = '20px';
      btn.onclick = () => window.scrollTo({top:0, behavior:'smooth'});
      document.body.appendChild(btn);
    }
  }
});
</script>

</body>
</html>
