<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextGen Website</title>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --text:#ffffff;
  --accent:#00f5ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  padding:60px 10%;
}

h1{
  font-size:3rem;
  margin-bottom:20px;
  background:linear-gradient(90deg,#00f5ff,#a855f7,#ff00cc);
  -webkit-background-clip:text;
  color:transparent;
}

.section{
  background:var(--card);
  padding:40px;
  border-radius:20px;
  margin-top:30px;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:12px 25px;
  border-radius:30px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  font-weight:bold;
}

.btn:hover{
  transform:scale(1.05);
}
</style>
</head>
<body>

<h1>NextGen Website</h1>

<div class="section">
  <h2>Project Overview</h2>
  <p>
    A high-performance responsive platform designed with futuristic UI,
    optimized performance, and advanced CSS animations.
  </p>
</div>

<div class="section">
  <h2>Technologies Used</h2>
  <p>HTML5, CSS3, Responsive Grid Layout, Modern UI Effects</p>
</div>

<a href="index.html" class="btn">⬅ Back to Portfolio</a>

</body>
</html>
